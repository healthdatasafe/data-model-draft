## MUCUS

body-vulva-mucus-inspect:
  version: v2
  label: Cervical Fluid Inspect
  description: Cervical fluid observation as a 9-dimensional vector, convertible across charting methods (Apple Health, Creighton, Billings, Mira, etc.)
  streamId: body-vulva-mucus-inspect
  eventType: vulva-mucus-inspect/9d-vector
  type: convertible
  converter-engine:
    key: euclidian-distance
    version: v0
    models: cervical-fluid
  repeatable: unlimited
body-vulva-mucus-stretch:
  version: v1
  label: Cervical Fluid Stretch
  description: Manual strech test of cervical fluid. Short can be streched less than 2 cm, long greater than 2cm. 
  streamId: body-vulva-mucus-stretch
  eventType: ratio/generic
  type: select
  options:
    - value: 0
      label: No Strech
    - value: 1
      label: Short
    - value: 2
      label: Long
  repeatable: unlimited

