## Bleeding
body-vulva-bleeding:
  version: v2
  label: Bleeding intensity
  description: Subjective bleeding intensity on a 0-1 proportion scale.
  streamId: body-vulva-bleeding
  eventType: ratio/proportion
  type: select
  options:
    - value: 0.0
      label:
        en: None
        fr: Aucun
    - value: 0.08
      label:
        en: Spotting
        fr: Spotting
    - value: 0.20
      label:
        en: Very light
        fr: Très léger
    - value: 0.35
      label:
        en: Light
        fr: Léger
    - value: 0.55
      label:
        en: Moderate
        fr: Modéré
    - value: 0.75
      label:
        en: Heavy
        fr: Abondant
    - value: 0.95
      label:
        en: Very heavy
        fr: Très abondant
  repeatable: unlimited

body-vulva-bleeding-browndark:
  version: v1
  label: Brown/dark coloration
  description: Presence of brown or dark coloration in bleeding. Qualifier for a co-occurring body-vulva-bleeding event.
  streamId: body-vulva-bleeding-browndark
  eventType: activity/plain
  type: checkbox
  repeatable: P1D

body-vulva-bleeding-clots:
  version: v1
  label: Blood clots
  description: Presence of blood clots during bleeding. Qualifier for a co-occurring bleeding event.
  streamId: body-vulva-bleeding-clots
  eventType: activity/plain
  type: checkbox
  repeatable: P1D

body-vulva-bleeding-postpartum:
  version: v1
  label: Postpartum Bleeding
  description: Vaginal bleeding following childbirth (lochia).
  streamId: body-vulva-bleeding-postpartum
  eventType: activity/plain
  type: checkbox
  repeatable: P1D

body-vulva-bleeding-miscarriage:
  version: v1
  label: Miscarriage Bleeding
  description: Vaginal bleeding associated with pregnancy loss.
  streamId: body-vulva-bleeding-miscarriage
  eventType: activity/plain
  type: checkbox
  repeatable: P1D

## Cervical Position

body-vulva-cervix-position:
  version: v1
  label:
    en: Cervical Position
    fr: Position du col utérin
  description:
    en: Self-assessed cervical position with three dimensions (height, firmness, openness) on a 0–1 fertility scale.
    fr: Position du col utérin auto-évaluée avec trois dimensions (hauteur, fermeté, ouverture) sur une échelle de fertilité 0–1.
  streamId: body-vulva-cervix-position
  eventType: cervix-position/3d-vectors
  type: composite
  composite:
    height:
      label:
        en: Height
        fr: Hauteur
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Low
            fr: Bas
        - value: 0.5
          label:
            en: Medium
            fr: Moyen
        - value: 1.0
          label:
            en: High
            fr: Haut
    firmness:
      label:
        en: Firmness
        fr: Fermeté
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Firm
            fr: Ferme
        - value: 0.5
          label:
            en: Medium
            fr: Moyen
        - value: 1.0
          label:
            en: Soft
            fr: Souple
    openness:
      label:
        en: Openness
        fr: Ouverture
      type: select
      canBeNull: true
      options:
        - value: 0.0
          label:
            en: Closed
            fr: Fermé
        - value: 0.5
          label:
            en: Medium
            fr: Moyen
        - value: 1.0
          label:
            en: Open
            fr: Ouvert
  repeatable: P1D
