profile-addresscountry:
  version: temporary
  label: 
    en: Country
    fr: Pays
  description: Country of living
  streamId: profile-address
  eventType: contact/country
  type: text
  repeatable: once
profile-avatar:
  version: v1
  label:
    en: Avatar
    fr: Avatar
  description: Profile picture (picture/attached, picture/base64, or picture/url)
  streamId: profile-avatar
  eventType: picture/*
  type: picture
  repeatable: once
profile-display-name:
  version: v1
  label:
    en: Display Name
    fr: Nom d'affichage
  description: Preferred display name
  streamId: profile-display-name
  eventType: contact/display-name
  type: text
  repeatable: once
profile-date-of-birth:
  label: Date of Birth
  description: Date of birth
  version: v1
  streamId: profile-date-of-birth
  eventType: date/iso-8601
  type: date
  repeatable: once
profile-name:
  version: temporary
  label: Name
  description: Name
  streamId: profile-name
  eventType: contact/name
  type: text
  repeatable: once
profile-surname:
  version: temporary
  label: Surname
  description: Surname
  streamId: profile-name
  eventType: contact/surname
  type: text
  repeatable: once
profile-sex:
  version: v1
  label: Sex
  description: Biological Sex
  streamId: profile-sex
  eventType: attributes/biological-sex
  type: select
  options:
    - value: male
      label: Male
    - value: female
      label: Female
  repeatable: once
