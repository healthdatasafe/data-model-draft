# Nutrition items — dietary and appetite tracking.

nutrition-appetite:
  version: v1
  label: Appetite
  description: Self-reported appetite level.
  streamId: nutrition-appetite
  eventType: ratio/proportion
  type: select
  options:
    - value: 0.25
      label:
        en: Decreased
        fr: Diminué
    - value: 0.50
      label:
        en: Normal
        fr: Normal
    - value: 0.75
      label:
        en: Increased
        fr: Augmenté
  repeatable: P1D
